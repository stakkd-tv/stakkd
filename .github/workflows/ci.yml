name: "Ruby on Rails CI"
on:
  pull_request:
  push:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
      - name: Install Yarn packages
        run: |
          corepack enable
          yarn
      - name: Lint all files
        run: bin/lint

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            rspec_tag: "~type:system"
          - name: system
            rspec_tag: "type:system"
    services:
      postgres:
        image: postgres:11-alpine
        ports:
          - "5432:5432"
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: rails
          POSTGRES_PASSWORD: password
    env:
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      TEST_PGHOST: 127.0.0.1
      TEST_PGPORT: 5432
      TEST_PGUSER: rails
      TEST_PGPASSWORD: password
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
      - name: Enable corepack
        run: |
          corepack enable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            imagemagick \
            ffmpeg \
            libvips \
            exiftool \
            mediainfo
      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Precompile assets
        if: ${{ matrix.name == 'system' }}
        run: bin/rails assets:precompile
      - name: Run tests
        run: |
          bin/rails db:create db:schema:load db:migrate
          bundle exec rake parallel:create
          bundle exec rake parallel:prepare
          bin/parallel-test --tag "${{ matrix.rspec_tag }}" || echo "rspec_failed=true" >> $GITHUB_ENV
      - name: Upload screenshots on fail
        if: env.rspec_failed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: system-spec-screenshots
          path: /home/runner/work/stakkd/stakkd/tmp/capybara/
      - name: Mark failure if needed
        if: env.rspec_failed == 'true'
        run: exit 1
